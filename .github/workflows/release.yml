name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish CangjieX.pkg
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            version="${version#v}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must use numeric x.y.z format, got '${version}'"
            exit 1
          fi

          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"

      - name: Check source patch manifest
        shell: bash
        run: make source-patch-check

      - name: Prepare Ruby SQLite dependency
        shell: bash
        run: |
          ruby -e 'require "sqlite3"' >/dev/null 2>&1 || sudo gem install sqlite3 --no-document

      - name: Build, verify, and checksum source package
        shell: bash
        run: |
          make source-checksum VERSION="${{ steps.release.outputs.version }}"
          shasum -a 256 -c build/source/CangjieX.pkg.sha256

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: CangjieX-release-build-logs
          path: |
            /tmp/CangjieX-upstream-source/source-build.log
            /tmp/CangjieX-upstream-source/database-cooker.log
            build/source/components.plist
            build/source/source-build-info.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          upstream_commit="$(awk '$1 == "#" && $2 == "upstream" { print $3 }' tools/source-patches/manifest.tsv)"
          release_notes="$(mktemp)"
          cat >"${release_notes}" <<EOF
          CangjieX ${VERSION}

          This release contains the unsigned universal macOS installer package built from the open source Yahoo KeyKey source tree.

          Upstream source commit:

              ${upstream_commit}

          Build patch manifest:

              manifest.tsv

          Build provenance:

              source-build-info.txt

          SHA256:

              $(cut -d ' ' -f 1 build/source/CangjieX.pkg.sha256)

          Install with:

              sudo installer -pkg CangjieX.pkg -target /

          After installation, log out and back in, then enable CangjieX in System Settings > Keyboard > Input Sources.
          EOF

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" build/source/CangjieX.pkg build/source/CangjieX.pkg.sha256 build/source/source-build-info.txt tools/source-patches/manifest.tsv --clobber
          else
            gh release create "${TAG_NAME}" build/source/CangjieX.pkg build/source/CangjieX.pkg.sha256 build/source/source-build-info.txt tools/source-patches/manifest.tsv \
              --target "${GITHUB_SHA}" \
              --title "CangjieX ${VERSION}" \
              --notes-file "${release_notes}"
          fi

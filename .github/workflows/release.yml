name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish CangjieX.pkg
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            version="${version#v}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi

          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"

      - name: Build installer package
        shell: bash
        run: |
          VERSION="${{ steps.release.outputs.version }}" ./build.sh

      - name: Verify installer package
        shell: bash
        run: |
          ./verify-pkg.sh build/CangjieX.pkg

      - name: Generate checksum
        shell: bash
        run: |
          make checksum

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          release_notes="$(mktemp)"
          cat >"${release_notes}" <<EOF
          CangjieX ${VERSION}

          This release contains the unsigned macOS installer package.

          Install with:

              sudo installer -pkg CangjieX.pkg -target /

          After installation, log out and back in, then enable CangjieX in System Settings > Keyboard > Input Sources.
          EOF

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" build/CangjieX.pkg build/CangjieX.pkg.sha256 --clobber
          else
            gh release create "${TAG_NAME}" build/CangjieX.pkg build/CangjieX.pkg.sha256 \
              --target "${GITHUB_SHA}" \
              --title "CangjieX ${VERSION}" \
              --notes-file "${release_notes}"
          fi

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build and verify package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Ruby SQLite dependency
        shell: bash
        run: |
          ruby -e 'require "sqlite3"' >/dev/null 2>&1 || sudo gem install sqlite3 --no-document

      - name: Build, verify, and checksum source package
        shell: bash
        run: |
          make source-checksum

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: CangjieX-source-pkg
          path: |
            build/source/CangjieX.pkg
            build/source/CangjieX.pkg.sha256
          if-no-files-found: ignore
          retention-days: 7
